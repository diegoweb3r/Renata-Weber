<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog – Renata Weber</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Blog-specific styles ── */
    :root {
      --cream: #faf8f5;
      --ink: #1a1a1a;
      --accent: #8b6f5e;
      --muted: #999;
      --border: #e8e2da;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Lato', sans-serif;
      line-height: 1.7;
    }

    /* ── Header / Nav ── */
    .blog-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.8rem 5vw;
      border-bottom: 1px solid var(--border);
    }

    .blog-nav .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      letter-spacing: .04em;
      color: var(--ink);
      text-decoration: none;
    }

    .blog-nav nav a {
      margin-left: 2rem;
      font-size: .85rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      opacity: .6;
      transition: opacity .2s;
    }
    .blog-nav nav a:hover { opacity: 1; }

    /* ── Hero título ── */
    .blog-hero {
      text-align: center;
      padding: 5rem 5vw 3rem;
      border-bottom: 1px solid var(--border);
    }

    .blog-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: -.01em;
    }

    .blog-hero p {
      margin-top: .8rem;
      color: var(--muted);
      font-size: .95rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── Grid de posts ── */
    .blog-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 5vw;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 3rem 2.5rem;
    }

    .post-card {
      display: flex;
      flex-direction: column;
      gap: .8rem;
      cursor: pointer;
    }

    .post-card .cover {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--border);
      display: block;
    }

    .post-card .cover-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #ede8e0, #d9d0c4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .post-card .meta {
      font-size: .78rem;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .post-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
    }

    .post-card p.excerpt {
      font-size: .9rem;
      color: #555;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-card .read-more {
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      align-self: flex-start;
      transition: color .2s, border-color .2s;
    }
    .post-card .read-more:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Post único (modal) ── */
    .post-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,18,15,.5);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .post-overlay.open { display: block; }

    .post-modal {
      background: var(--cream);
      max-width: 720px;
      margin: 0 auto;
      padding: 3.5rem 4rem;
      position: relative;
    }

    @media (max-width: 600px) {
      .post-modal { padding: 2rem 1.5rem; }
    }

    .post-modal .close-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
    }

    .post-modal .post-meta {
      font-size: .78rem;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .post-modal h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 2rem;
    }

    .post-modal img.cover {
      width: 100%;
      margin-bottom: 2.5rem;
      display: block;
    }

    .post-modal .post-body {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #333;
    }

    .post-modal .post-body h2,
    .post-modal .post-body h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      margin: 2rem 0 .8rem;
    }

    .post-modal .post-body p { margin-bottom: 1.2rem; }
    .post-modal .post-body img { max-width: 100%; margin: 1.5rem 0; }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 0;
      color: var(--muted);
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: .5rem;
    }

    /* ── Footer ── */
    .blog-footer {
      text-align: center;
      padding: 2.5rem 5vw;
      border-top: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .08em;
    }
  </style>
</head>
<body>

  <!-- Navegação -->
  <header class="blog-nav">
    <a href="index.html" class="logo">Renata Weber</a>
    <nav>
      <a href="index.html">Início</a>
      <a href="index.html#portfolio">Portfólio</a>
      <a href="blog.html">Blog</a>
      <a href="index.html#contato">Contato</a>
    </nav>
  </header>

  <!-- Título do blog -->
  <section class="blog-hero">
    <h1>Blog</h1>
    <p>Pensamentos, bastidores &amp; reflexões</p>
  </section>

  <!-- Grid de posts -->
  <main class="blog-grid" id="blog-grid">
    <div class="empty-state">
      <h3>Em breve…</h3>
      <p>Os primeiros textos estão chegando.</p>
    </div>
  </main>

  <!-- Overlay do post individual -->
  <div class="post-overlay" id="post-overlay">
    <article class="post-modal" id="post-modal">
      <button class="close-btn" id="close-btn" aria-label="Fechar">×</button>
      <div id="post-content"></div>
    </article>
  </div>

  <!-- Footer -->
  <footer class="blog-footer">
    © <span id="year"></span> Renata Weber — Todos os direitos reservados
  </footer>

  <!-- ─────────────────────────────────────────────────────
       Script: lê os posts da pasta _posts (via manifest.json)
       e renderiza no grid. Veja instruções abaixo.
  ───────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gray-matter-browser@1.0.3/dist/index.min.js" onerror="window.matter=null"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Utilitários ──────────────────────────────────────
    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function parseFrontmatter(raw) {
      // Simple frontmatter parser (---\nkey: val\n---\nbody)
      const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { data: {}, content: raw };
      const data = {};
      match[1].split('\n').forEach(line => {
        const [k, ...v] = line.split(':');
        if (k) data[k.trim()] = v.join(':').trim().replace(/^["']|["']$/g, '');
      });
      return { data, content: match[2] };
    }

    // ── Renderiza um post no modal ────────────────────────
    function openPost(post) {
      const overlay = document.getElementById('post-overlay');
      const content = document.getElementById('post-content');
      content.innerHTML = `
        <div class="post-meta">${formatDate(post.date)}</div>
        <h1>${post.title}</h1>
        ${post.thumbnail ? `<img class="cover" src="${post.thumbnail}" alt="${post.title}" />` : ''}
        <div class="post-body">${marked.parse(post.body || '')}</div>
      `;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('close-btn').addEventListener('click', () => {
      document.getElementById('post-overlay').classList.remove('open');
      document.body.style.overflow = '';
    });

    document.getElementById('post-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('post-overlay')) {
        document.getElementById('post-overlay').classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    // ── Carrega lista de posts via manifest.json ──────────
    async function loadPosts() {
      let posts = [];
      try {
        const res = await fetch('_posts/manifest.json');
        if (!res.ok) throw new Error('no manifest');
        const files = await res.json(); // array de filenames, ex: ["2024-01-15-meu-post.md"]

        posts = await Promise.all(files.map(async fname => {
          const r = await fetch(`_posts/${fname}`);
          const raw = await r.text();
          const { data, content } = parseFrontmatter(raw);
          return { ...data, body: content, slug: fname };
        }));

        // Ordena do mais recente para o mais antigo
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
      } catch {
        // Sem manifest → mantém empty state
        return;
      }

      if (!posts.length) return;

      const grid = document.getElementById('blog-grid');
      grid.innerHTML = posts.map((post, i) => `
        <article class="post-card" data-index="${i}">
          ${post.thumbnail
            ? `<img class="cover" src="${post.thumbnail}" alt="${post.title}" loading="lazy" />`
            : `<div class="cover-placeholder">Renata Weber</div>`
          }
          <span class="meta">${formatDate(post.date)}</span>
          <h2>${post.title}</h2>
          ${post.excerpt ? `<p class="excerpt">${post.excerpt}</p>` : ''}
          <a class="read-more" href="#" data-index="${i}">Ler texto</a>
        </article>
      `).join('');

      // Eventos de clique
      grid.querySelectorAll('[data-index]').forEach(el => {
        el.addEventListener('click', e => {
          e.preventDefault();
          const idx = parseInt(el.closest('[data-index]')?.dataset.index ?? el.dataset.index);
          openPost(posts[idx]);
        });
      });
    }

    loadPosts();
  </script>
</body>
</html>
